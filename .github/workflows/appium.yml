name: Appium Mobile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Web App and Sync Android
      run: |
        npm run build
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Verify APK exists
      run: |
        if [ ! -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "APK not found!"
          exit 1
        fi
        echo "APK exists at android/app/build/outputs/apk/debug/app-debug.apk"
        ls -lh android/app/build/outputs/apk/debug/app-debug.apk
      

    - name: Install Appium and UIAutomator2
      run: |
        npm install -g appium
        appium driver list --installed
        
    - name: Run Tests in Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        profile: pixel_6
        script: |
          echo "Waiting for emulator to be fully booted..."
          adb wait-for-device
          
          echo "=== ADB Devices ==="
          adb devices
          
          adb devices | grep -q "emulator" || exit 1
          
          echo "Emulator is visible. Installing APK..."
          adb install "android/app/build/outputs/apk/debug/app-debug.apk"
          
          echo "Starting Appium..."
          appium --port 4723 &
          sleep 10
          
          echo "Running mobile tests..."
          npm run test:mobile
      
    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-reports
        path: reports/appium/
