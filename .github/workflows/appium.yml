name: Appium Mobile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Web App and Sync Android
      run: |
        npm run build
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Verify APK exists
      run: |
        if [ ! -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "APK not found!"
          exit 1
        fi
        echo "APK exists at android/app/build/outputs/apk/debug/app-debug.apk"
        ls -lh android/app/build/outputs/apk/debug/app-debug.apk
      

    - name: Install Appium and UIAutomator2
      run: |
        npm install -g appium
        appium driver list --installed
        
    - name: Start Appium Server
      run: appium --port 4723 &

    - name: Run Mobile Tests
      run: npm run test:mobile
      
    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-reports
        path: appium-tests/reports/
