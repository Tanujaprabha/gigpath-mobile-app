name: Appium Mobile Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.15.0'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Appium and UIAutomator2
      run: |
        npm install -g appium
        appium plugin install --source=npm appium-uiautomator2-driver
        
    - name: Start Appium Server
      run: appium --allow-insecure uiautomator2:chromedriver_autodownload &
      
    - name: Run Mobile Tests
      run: npm run test:mobile
      
    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-reports
        path: appium-tests/reports/
